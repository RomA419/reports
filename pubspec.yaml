name: car_care
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.2  
  crypto: ^3.0.3
  sqflite: ^2.3.0
  path: ^1.9.0
  animate_do: ^2.1.0
  fl_chart: ^1.1.1
  cupertino_icons: ^1.0.8
  http: ^0.13.6 # downgraded for compatibility with audioplayers
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.10.13
  universal_platform: ^1.1.0
  shelf_static: ^1.1.3
  flutter_gl: ^0.0.21
  audioplayers: ^1.1.0
  qr_flutter: ^4.0.0
  qr_code_scanner: ^0.7.0
  openai: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/passat.png
    - assets/images/m5.png
    - assets/images/300.png
    - assets/images/Porsche 911 Turbo S.png
    - assets/images/Tesla Model 3.png
    - assets/images/app_icon.png
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/app_icon.png # замени на путь к своей иконке